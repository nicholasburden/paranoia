<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Paranoia</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- HOME SCREEN -->
        <section id="screen-home" class="screen active">
            <div class="screen-content">
                <h1 class="logo">PARANOIA</h1>
                <p class="subtitle">The party game that keeps you guessing</p>

                <div class="form-group">
                    <input type="text" id="input-name" placeholder="Your name" maxlength="20" autocomplete="off">
                </div>

                <button id="btn-create" class="btn btn-primary">Create Game</button>

                <div class="divider"><span>or</span></div>

                <div class="form-group">
                    <input type="text" id="input-code" placeholder="Room code" maxlength="4" autocomplete="off" style="text-transform: uppercase; letter-spacing: 0.3em; text-align: center;">
                </div>

                <button id="btn-join" class="btn btn-secondary">Join Game</button>

                <p id="home-error" class="error-text"></p>
            </div>
        </section>

        <!-- LOBBY SCREEN -->
        <section id="screen-lobby" class="screen">
            <div class="screen-content">
                <h2>Room Code</h2>
                <div id="room-code-display" class="room-code">----</div>
                <p class="hint">Share this code with your friends</p>

                <h3>Players</h3>
                <ul id="player-list" class="player-list"></ul>

                <p id="lobby-status" class="hint"></p>

                <button id="btn-start" class="btn btn-primary" style="display:none;">Start Game</button>
            </div>
        </section>

        <!-- GAME SCREEN -->
        <section id="screen-game" class="screen">
            <div class="screen-content">
                <div id="game-header" class="game-header">
                    <span id="round-info" class="round-info"></span>
                    <span id="timer-display" class="timer-display"></span>
                </div>

                <div id="game-status" class="game-status"></div>

                <!-- Asker: write a question -->
                <div id="panel-ask" class="game-panel" style="display:none;">
                    <p class="panel-label">Write a question for <strong id="ask-target"></strong>:</p>
                    <div id="suggestions" class="suggestions"></div>
                    <textarea id="input-question" placeholder="Who is most likely to..." maxlength="200" rows="2"></textarea>
                    <button id="btn-submit-question" class="btn btn-primary">Submit Question</button>
                </div>

                <!-- Answerer: pick a player -->
                <div id="panel-answer" class="game-panel" style="display:none;">
                    <p class="panel-label">The question is:</p>
                    <p id="answer-question" class="question-display"></p>
                    <p class="panel-label">Pick a player:</p>
                    <div id="answer-buttons" class="player-buttons"></div>
                </div>

                <!-- Named player: drink or pass -->
                <div id="panel-reveal" class="game-panel" style="display:none;">
                    <p id="reveal-message" class="panel-label"></p>
                    <div class="reveal-buttons">
                        <button id="btn-drink" class="btn btn-drink">🍺 Drink & Reveal</button>
                        <button id="btn-pass" class="btn btn-pass">Pass</button>
                    </div>
                </div>

                <!-- Turn result -->
                <div id="panel-result" class="game-panel" style="display:none;">
                    <div id="result-content" class="result-content"></div>
                </div>

                <!-- Host end game button -->
                <button id="btn-end-game" class="btn btn-small btn-danger" style="display:none;">End Game</button>
            </div>
        </section>

        <!-- GAME OVER SCREEN -->
        <section id="screen-gameover" class="screen">
            <div class="screen-content">
                <h2>Game Over!</h2>
                <div id="recap-list" class="recap-list"></div>
                <button id="btn-lobby" class="btn btn-primary">Back to Lobby</button>
                <button id="btn-home" class="btn btn-secondary">Leave Game</button>
            </div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
